<!--
# index.html
This file allows users to select a role (Admin, Patient, Doctor) and triggers modal-based login functionality.
 -->
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Select Role</title>
        <link rel="icon" href="./assets/images/logo/logo.png" />
        <link rel="stylesheet" href="./assets/css/style.css" />
        <link rel="stylesheet" href="./assets/css/index.css" />
        <script src="./js/util.js" defer></script>
        <script src="./js/render.js" defer></script>
        <script src="./js/components/header.js" defer></script>
        <script src="./js/components/footer.js" defer></script>
    </head>
    <body>
        <div class="container">
            <div class="wrapper">
                    <div id="headerDiv"></div>
                    <main class="main-content">
                        <h2>Select Your Role</h2>
                        <button id="adminButton" onclick="setRole('admin')">Admin</button>
                        <button id="patientButton" onclick="setRole('patient')">Patient</button>
                        <button id="doctorButton" onclick="setRole('doctor')">Doctor</button>
                    </main>
                    <div id="footerDiv"></div>
                </div>
            </div>
        <div id="modalDialogContainerDiv" class="modal">
            <div id="modalDialogBodyDiv"></div>
            <button id="closeModalDialogButton">Close</button>
        </div>
        <script type="module" src="./js/services/index.js" defer></script>
    </body>
</html>
